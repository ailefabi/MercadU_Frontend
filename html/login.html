<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="/css/login.css" />
        <title>Login</title>
    </head>
    <body>
        <div class="container" id="container">
            <div class="form-container sign-in-container">
                <form id="loginForm">
                    <span class="brand">MercadU</span>
                    <h2>Login</h2>

                    <input type="email" id="userEmail" placeholder="Correo institucional" required />
                    <input type="password" id="userPassword" placeholder="Contraseña" required />

                    <p id = "message"> . </p>

                    <button type="submit">Ingresar</button>

                    <p class="toggle-text">¿No tienes cuenta? <a href="register.html" id="signUp">Regístrate</a></p>
                </form>
            </div>
        </div>
        
    <script src="../js/login.js"></script>
    </body>
    
</html>
